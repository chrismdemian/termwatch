appId: com.termwatch.app
productName: TermWatch
copyright: Copyright © 2026 TermWatch

# VMP signing for Castlabs ECS (Widevine DRM)
# macOS: sign BEFORE Apple code-signing
afterPack: build/vmp-sign.js
# Windows: sign AFTER Windows code-signing
afterSign: build/vmp-sign.js

directories:
  output: dist

files:
  - src/**/*
  - THIRD-PARTY-LICENSES.txt
  - "!**/*.map"

asar: true
asarUnpack:
  - "**/node_modules/@lydell/node-pty*/**"

extraResources:
  - from: build/icon.png
    to: icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  runAfterFinish: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  license: LICENSE
  deleteAppDataOnUninstall: true
  uninstallDisplayName: TermWatch

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

publish:
  provider: github
  releaseType: draft
