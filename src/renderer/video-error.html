      height: 100vh;
      overflow: hidden;
    }
    .error-container {

      opacity: 0.6;
    }

      margin-bottom: 8px;
      color: #d4915e;
    }
    .error-container p {
      font-size: 13px;
      color: #8a8894;
      max-width: 320px;
      line-height: 1.5;
    }

</head>
