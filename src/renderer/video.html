<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0c0c14;
      color: #e8e6e3;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .welcome {
      text-align: center;
      opacity: 0.6;
    }
    .welcome h1 {
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 8px;
      color: #d4915e;
    }
    .welcome p {
      font-size: 13px;
      color: #8a8894;
    }
  </style>
</head>
<body>
  <div class="welcome">
    <h1>TermWatch</h1>
    <p>Enter a URL in the controls bar to start watching</p>
  </div>
</body>
</html>
